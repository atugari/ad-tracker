<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>自慢する | 丸場所記憶ゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#f7f6f2;--surface:#fff;--surface2:#f0efe9;--border2:rgba(0,0,0,0.06);--text:#1a1a18;--text2:#6b6b65;--text3:#a8a8a2;--green:#1D9E75;--blue:#378ADD;--accent:#D85A30;--r:14px;--rs:8px;--x:#000;}
    @media(prefers-color-scheme:dark){:root{--bg:#141412;--surface:#1e1e1b;--surface2:#28281f;--border2:rgba(255,255,255,0.06);--text:#f0efe9;--text2:#9a9a92;--text3:#5a5a54;--x:#fff;}}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;min-height:100dvh;}
    .app{max-width:420px;margin:0 auto;padding:16px 16px 48px;}
    .page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border2);}
    .back-btn{font-size:20px;text-decoration:none;color:var(--text2);line-height:1;}
    .page-title{font-size:18px;font-weight:500;}

    /* スコアカード */
    .score-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:20px;margin-bottom:16px;}
    .score-card-name{font-size:13px;color:var(--text3);margin-bottom:4px;}
    .score-card-nick{font-size:20px;font-weight:500;color:var(--text);margin-bottom:12px;}
    .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    .score-box{background:var(--surface2);border-radius:var(--rs);padding:12px 14px;}
    .score-box-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
    .score-box-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text);}
    .score-box-val.accent{color:var(--green);}
    .score-box.wide{grid-column:1/-1;}
    .rank-badge{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border-radius:var(--rs);padding:6px 12px;font-size:12px;color:var(--text2);}
    .rank-badge.gold{background:rgba(212,160,23,0.12);color:#a07800;}
    @media(prefers-color-scheme:dark){.rank-badge.gold{background:rgba(212,160,23,0.18);color:#e6b800;}}
    .no-data{text-align:center;padding:32px 0;color:var(--text3);font-size:13px;line-height:2;}

    /* テンプレート選択 */
    .section-label{font-size:11px;color:var(--text3);letter-spacing:0.06em;margin:20px 0 8px 2px;}
    .tpl-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
    .tpl-item{background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rs);padding:12px 14px;cursor:pointer;transition:border-color 0.15s,background 0.1s;}
    .tpl-item:active{background:var(--surface2);}
    .tpl-item.selected{border-color:var(--blue);background:rgba(55,138,221,0.05);}
    .tpl-item-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;}
    .tpl-item-preview{font-size:11px;color:var(--text3);line-height:1.6;white-space:pre-wrap;}

    /* プレビュー */
    .preview-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:16px;margin-bottom:16px;}
    .preview-label{font-size:11px;color:var(--text3);margin-bottom:8px;}
    .preview-text{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;word-break:break-all;}
    .preview-count{font-size:11px;color:var(--text3);text-align:right;margin-top:6px;}
    .preview-count.over{color:var(--accent);}

    /* ポストボタン */
    .post-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 0;border-radius:var(--r);border:none;background:var(--x);color:var(--bg);font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity 0.1s;text-decoration:none;}
    .post-btn:active{opacity:0.8;}
    .post-btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;}
    .copy-btn{display:block;width:100%;padding:11px 0;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:8px;transition:background 0.1s;}
    .copy-btn:active{background:var(--surface);}
    .copy-done{color:var(--green);}

    footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--border2);text-align:center;font-size:11px;color:var(--text3);line-height:2.2;}
    footer a{color:var(--text3);text-decoration:underline;}
  </style>
</head>
<body>
<div class="app">
  <div class="page-header">
    <a class="back-btn" href="index.html">←</a>
    <span class="page-title">自慢する</span>
  </div>

  <!-- スコアカード -->
  <div id="score-card-area"></div>

  <!-- テンプレート選択 -->
  <div class="section-label">ポストの内容を選ぶ</div>
  <div class="tpl-list" id="tpl-list"></div>

  <!-- プレビュー -->
  <div class="preview-box">
    <div class="preview-label">ポストのプレビュー</div>
    <div class="preview-text" id="preview-text">← テンプレートを選んでください</div>
    <div class="preview-count" id="preview-count"></div>
  </div>

  <!-- ポストボタン -->
  <a class="post-btn" id="post-btn" href="#" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.261 5.635 5.903-5.635zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    Xにポストする
  </a>
  <button class="copy-btn" id="copy-btn" onclick="copyText()">テキストをコピー</button>

  <footer>
    <a href="index.html">ホーム</a>　|　
    <a href="guide.html">使い方ガイド</a>　|　
    <a href="settings.html">設定</a><br>
    &copy; 2026 丸場所記憶ゲーム
  </footer>
</div>

<script>
  const DB_URL = 'https://ad-game-7b40a-default-rtdb.asia-southeast1.firebasedatabase.app';
  const GAME_URL = 'https://atugari.github.io/ad-tracker/';
  const ONE_YEAR = 365*24*60*60*1000;

  const nick      = localStorage.getItem('adgame_nick') || null;
  const deviceId  = localStorage.getItem('adgame_device_id') || null;
  const titlesRaw = JSON.parse(localStorage.getItem('adgame_titles') || '[]');

  // 称号マスター（types含む）
  const TITLE_DEFS = [
    { id:'ad_killer',      type:'secret', name:'それは勘弁してくれ……' },
    { id:'cheat_detected', type:'arcane', name:'一つの手段' },
  ];

  function fmtScore(n){
    if(!n) return '0pt';
    if(n >= 10000){
      const man = Math.floor(n/10000);
      const rest = n % 10000;
      return rest > 0 ? man+'万'+rest.toLocaleString()+'pt' : man+'万pt';
    }
    return n.toLocaleString()+'pt';
  }

  let myScore = 0;
  let myRank  = 0;
  let totalPlayers = 0;
  let loaded = false;

  // Firebaseからスコアと順位を取得
  async function loadMyData(){
    if(!nick) return;
    try {
      const res  = await fetch(DB_URL+'/rankings.json');
      const data = await res.json();
      if(!data) return;
      const now = Date.now();
      const entries = Object.values(data)
        .filter(e=>e&&e.score&&(now-e.updatedAt)<=ONE_YEAR)
        .sort((a,b)=>b.score-a.score);
      totalPlayers = entries.length;
      const mine = entries.find(e=>e.name===nick&&e.deviceId===deviceId);
      if(mine){
        myScore = mine.score;
        myRank  = entries.findIndex(e=>e.name===nick&&e.deviceId===deviceId) + 1;
      }
    } catch(e){}
    loaded = true;
    renderAll();
  }

  function renderScoreCard(){
    const el = document.getElementById('score-card-area');
    if(!nick){
      el.innerHTML = '<div class="score-card"><div class="no-data">ニックネームが登録されていません。<br>ホームでニックネームを登録してからプレイしてください。</div></div>';
      return;
    }
    const rankClass = myRank===1?'gold':myRank===2||myRank===3?'':'';
    const rankText  = myRank > 0
      ? (myRank===1?'1位':myRank===2?'2位':myRank===3?'3位':myRank+'位') + '　/　'+totalPlayers+'人中'
      : 'ランキング未登録';
    const titleCount = titlesRaw.length;
    const arcaneCount = titlesRaw.filter(t=>{const d=TITLE_DEFS.find(x=>x.id===t.id);return d&&d.type==='arcane';}).length;

    el.innerHTML =
      '<div class="score-card">'+
        '<div class="score-card-name">プレイヤー</div>'+
        '<div class="score-card-nick">'+nick+'</div>'+
        '<div class="score-grid">'+
          '<div class="score-box">'+
            '<div class="score-box-label">ハイスコア</div>'+
            '<div class="score-box-val accent">'+fmtScore(myScore)+'</div>'+
          '</div>'+
          '<div class="score-box">'+
            '<div class="score-box-label">ランキング</div>'+
            '<div class="score-box-val" style="font-size:16px;padding-top:4px;">'+
              (myRank>0 ? myRank+'位' : '未登録')+
            '</div>'+
          '</div>'+
          '<div class="score-box">'+
            '<div class="score-box-label">入手称号数</div>'+
            '<div class="score-box-val">'+titleCount+'</div>'+
          '</div>'+
          '<div class="score-box">'+
            '<div class="score-box-label">Arcane称号</div>'+
            '<div class="score-box-val">'+arcaneCount+'</div>'+
          '</div>'+
        '</div>'+
        (myRank>0?'<div class="rank-badge '+rankClass+'">全期間 '+rankText+'</div>':'')+''+
      '</div>';
  }

  // テンプレート定義
  function getTemplates(){
    const titleCount = titlesRaw.length;
    const arcaneCount = titlesRaw.filter(t=>{const d=TITLE_DEFS.find(x=>x.id===t.id);return d&&d.type==='arcane';}).length;
    const rankStr = myRank > 0 ? myRank+'位' : null;
    const rankOfStr = totalPlayers > 0 ? totalPlayers+'人中' : null;

    const tpls = [];

    // スコア自慢
    if(myScore > 0){
      tpls.push({
        title: 'スコア自慢',
        text: [
          '丸場所記憶ゲームで',
          fmtScore(myScore)+'を出しました！',
          rankStr ? (rankStr+(rankOfStr?' '+rankOfStr:'')) : null,
          '',
          '▶ '+GAME_URL,
          '#丸場所記憶ゲーム',
        ].filter(v=>v!==null).join('\n'),
      });
    }

    // ランキング自慢
    if(myRank > 0 && myRank <= 10){
      tpls.push({
        title: 'ランキング自慢（'+myRank+'位）',
        text: [
          '丸場所記憶ゲームで'+rankStr+'になりました！',
          rankOfStr ? rankOfStr+'でのランクインです' : null,
          'スコア：'+fmtScore(myScore),
          '',
          'あなたは私を超えられる？',
          '▶ '+GAME_URL,
          '#丸場所記憶ゲーム',
        ].filter(v=>v!==null).join('\n'),
      });
    }

    // 称号自慢
    if(titleCount > 0){
      const arcaneText = arcaneCount > 0 ? '（うちArcane称号 '+arcaneCount+'個！）' : '';
      tpls.push({
        title: '称号コレクション自慢',
        text: [
          '丸場所記憶ゲームで'+titleCount+'個の称号を入手しました！'+arcaneText,
          '',
          '称号を集めながら記憶力を鍛えよう',
          '▶ '+GAME_URL,
          '#丸場所記憶ゲーム',
        ].join('\n'),
      });
    }

    // Arcane自慢
    if(arcaneCount > 0){
      tpls.push({
        title: 'Arcane称号自慢',
        text: [
          '丸場所記憶ゲームでArcane称号を'+arcaneCount+'個発見しました…',
          '存在すら明かされていない隠し称号です',
          '',
          '▶ '+GAME_URL,
          '#丸場所記憶ゲーム',
        ].join('\n'),
      });
    }

    // 招待
    tpls.push({
      title: 'ゲームを紹介する',
      text: [
        '記憶力ゲームにハマってます',
        '丸が消えた場所を5秒以内に当てるシンプルなゲームなんだけど',
        'これが意外と難しい…',
        '',
        '▶ '+GAME_URL,
        '#丸場所記憶ゲーム',
      ].join('\n'),
    });

    return tpls;
  }

  let selectedIdx = 0;
  let templates = [];

  function renderTemplates(){
    templates = getTemplates();
    const list = document.getElementById('tpl-list');
    list.innerHTML = '';
    templates.forEach((tpl, i)=>{
      const item = document.createElement('div');
      item.className = 'tpl-item' + (i===0?' selected':'');
      item.innerHTML =
        '<div class="tpl-item-title">'+tpl.title+'</div>'+
        '<div class="tpl-item-preview">'+escHtml(tpl.text.split('\n').slice(0,3).join('\n'))+'…</div>';
      item.onclick = ()=>{ selectTemplate(i); };
      list.appendChild(item);
    });
    selectTemplate(0);
  }

  function selectTemplate(i){
    selectedIdx = i;
    document.querySelectorAll('.tpl-item').forEach((el,idx)=>{
      el.classList.toggle('selected', idx===i);
    });
    updatePreview();
  }

  function updatePreview(){
    const tpl = templates[selectedIdx];
    if(!tpl) return;
    const text = tpl.text;
    const len  = [...text].length;
    document.getElementById('preview-text').textContent = text;
    const countEl = document.getElementById('preview-count');
    countEl.textContent = len + ' / 280文字';
    countEl.className = 'preview-count' + (len > 280 ? ' over' : '');
    // ポストボタンのhrefを更新
    const postBtn = document.getElementById('post-btn');
    postBtn.href = 'https://x.com/intent/tweet?text=' + encodeURIComponent(text);
  }

  function copyText(){
    const tpl = templates[selectedIdx];
    if(!tpl) return;
    navigator.clipboard.writeText(tpl.text).then(()=>{
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'コピーしました！';
      btn.classList.add('copy-done');
      setTimeout(()=>{
        btn.textContent = 'テキストをコピー';
        btn.classList.remove('copy-done');
      }, 2000);
    }).catch(()=>{
      // fallback
      const ta = document.createElement('textarea');
      ta.value = tpl.text;
      ta.style.position = 'fixed';ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'コピーしました！';
      btn.classList.add('copy-done');
      setTimeout(()=>{ btn.textContent='テキストをコピー'; btn.classList.remove('copy-done'); }, 2000);
    });
  }

  function escHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderAll(){
    renderScoreCard();
    renderTemplates();
  }

  // 初期化（スコアカードはすぐ出して、Firebase読み込み後に更新）
  renderScoreCard();
  renderTemplates();
  loadMyData();
</script>
</body>
</html>
