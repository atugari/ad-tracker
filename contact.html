<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="広告ゲームへのお問い合わせページです。">
  <title>お問い合わせ｜広告ゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#f7f6f2;--surface:#fff;--surface2:#f0efe9;--border2:rgba(0,0,0,0.06);--text:#1a1a18;--text2:#6b6b65;--text3:#a8a8a2;--green:#1D9E75;--r:14px;--rs:8px;}
    @media(prefers-color-scheme:dark){:root{--bg:#141412;--surface:#1e1e1b;--surface2:#28281f;--border2:rgba(255,255,255,0.06);--text:#f0efe9;--text2:#9a9a92;--text3:#5a5a54;}}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.8;min-height:100dvh;}
    .wrap{max-width:640px;margin:0 auto;padding:32px 20px 64px;}
    .back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);text-decoration:none;margin-bottom:24px;}
    h1{font-size:22px;font-weight:500;margin-bottom:6px;}
    .sub{font-size:13px;color:var(--text3);margin-bottom:28px;}
    .card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:20px 24px;margin-bottom:16px;}
    .card h2{font-size:15px;font-weight:500;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border2);}
    .card p{font-size:13px;color:var(--text2);line-height:1.9;margin-bottom:12px;}
    .card p:last-child{margin-bottom:0;}
    .form-btn{display:inline-block;font-size:14px;font-weight:500;padding:12px 24px;background:var(--green);color:#fff;border-radius:var(--rs);text-decoration:none;margin-top:4px;}
    .note{font-size:12px;color:var(--text3);margin-top:10px;line-height:1.7;}
    footer{margin-top:32px;text-align:center;font-size:11px;color:var(--text3);line-height:2.2;}
    footer a{color:var(--text3);text-decoration:underline;}
  </style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">← 広告ゲームに戻る</a>
  <h1>お問い合わせ</h1>
  <p class="sub">ご質問・ご要望・不具合の報告はこちらからどうぞ。</p>

  <div class="card">
    <h2>お問い合わせフォーム</h2>
    <p>以下のボタンからGoogleフォームでお問い合わせいただけます。通常2〜3営業日以内にご返信します。</p>
    <!-- GoogleフォームのURLを取得したら下のリンクのhref部分を置き換えてください -->
    <a class="form-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSdbacPHgX8rHwqWU9eiVME2p23hk7TXFC1OX8FmML6Gc5Kpiw/viewform?usp=dialog" target="_blank" rel="noopener">お問い合わせフォームを開く</a>
    <p class="note">※ リンクをタップするとGoogleフォームが開きます。フォームの回答内容以外の情報は収集しません。</p>
  </div>

  <div class="card">
    <h2>よくある質問</h2>
    <p>お問い合わせの前に<a href="faq.html" style="color:var(--text2)">よくある質問</a>もご確認ください。多くの疑問はこちらで解決できます。</p>
  </div>

  <footer>
    <a href="index.html">トップに戻る</a>　|　<a href="guide.html">使い方ガイド</a>　|　<a href="faq.html">よくある質問</a>　|　<a href="privacy.html">プライバシーポリシー</a><br>
    &copy; 2026 広告ゲーム
  </footer>
</div>
</body>
</html>
